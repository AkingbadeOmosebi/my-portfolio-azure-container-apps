name: Portfolio CI/CD (ECR → Azure Container Apps + Scans)

on:
  push:
    branches: ["main"]    # Pipeline triggers on push to main branch
  pull_request:
    branches: ["main"]    # Also triggers on pull requests to main

# Repo-wide environment variables (all secrets are hidden)
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}           # AWS region, hidden
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}       # AWS ECR registry, hidden
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}   # AWS ECR repository, hidden

jobs:
  # --- 1) SonarCloud Code Quality Scan ---
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # Pulls source code for analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
        # Java required for SonarCloud

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}   # GitHub secret
          SONAR_ORGANIZATION: ${{ secrets.SONARCLOUD_ORG }}
          SONAR_PROJECT_KEY: my-portfolio-app

        # Performs static code analysis (bugs, smells, vulnerabilities)

  # --- 2) tfsec Terraform Security Scan ---
  tfsec:
    name: tfsec Security Scan
    runs-on: ubuntu-latest
    needs: sonarcloud   # Only run after SonarCloud passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tfsec
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
        # Installs tfsec CLI for scanning Terraform

      - name: Run tfsec scan
        run: tfsec .
        # Scans all Terraform code for misconfigurations before deployment

  # --- 3) Docker Build & Push to AWS ECR ---
  build-and-deploy:
    name: Build Docker & Push to ECR
    runs-on: ubuntu-latest
    needs: tfsec   # Only run if tfsec scan passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Compute image tags
        id: vars
        run: |
          echo "SHA_SHORT=${GITHUB_SHA::12}" >> $GITHUB_OUTPUT
          echo "IMAGE_URI=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}" >> $GITHUB_OUTPUT
        # Short SHA used as unique Docker image tag

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.vars.outputs.IMAGE_URI }}:latest \
            -t ${{ steps.vars.outputs.IMAGE_URI }}:${{ steps.vars.outputs.SHA_SHORT }} \
            ./app
        # Build Docker image from app folder

      - name: Push Docker image
        run: |
          docker push ${{ steps.vars.outputs.IMAGE_URI }}:latest
          docker push ${{ steps.vars.outputs.IMAGE_URI }}:${{ steps.vars.outputs.SHA_SHORT }}
        # Push both tags to AWS ECR

  # --- 4) Terraform Deploy to Azure ---
  terraform:
    name: Terraform Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-deploy   # Deploy only after Docker image pushed
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        # Authenticate to Azure using Service Principal stored as secret

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
        # Install Terraform CLI

      - name: Terraform Init/Plan/Apply
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_image_tag: ${{ steps.vars.outputs.SHA_SHORT }}
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
        run: |
          terraform init
          terraform plan -out=tfplan
          terraform apply -auto-approve tfplan
        # Deploys the new Docker image to Azure Container Apps using Terraform
